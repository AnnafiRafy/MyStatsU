<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyStatsU - Notifikasi</title>
  <script src="js/auth.js" data-require-auth></script>
  <script src="js/app-utils.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app-theme.css" />
  <link rel="stylesheet" href="css/pages/notifikasi.css" />
</head>
<body>
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Notifikasi <em>Kampus</em></h1>
      <div class="topbar-sub">Pengingat, motivasi, dan informasi dari sistem</div>
    </div>
    <div class="topbar-right">
      <button class="btn-primary" id="readAllBtn">
        <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
        Tandai Semua Dibaca
      </button>
    </div>
  </div>

  <div class="content-grid" style="grid-template-columns:1fr;">
    <section class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Daftar Notifikasi</div>
          <div class="card-sub" id="notifSummary">Klik satu notifikasi untuk menandainya sudah dibaca</div>
        </div>
      </div>
      <div class="list" id="notifList"></div>
    </section>
  </div>
</main>
  <script src="js/pages/notifikasi.js"></script>
</body>
</html>
